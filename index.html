<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>정기 KPI 보고서 생성기</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  /* base */
  --bg:#F2F0EC;
  --card:#FFFFFF;
  --border:#E2DFD8;
  --border-lt:#EDEAE4;
  --t1:#1C1C1C;
  --t2:#404040;
  --t3:#6E6E6E;
  --t4:#A0A0A0;

  /* pastel palette */
  --rose-bg:#FAE5E8;   --rose-bd:#F0C8CE;   --rose-tx:#8C3A44;
  --amber-bg:#FBF0E0;  --amber-bd:#F2D9B4;  --amber-tx:#8A5E2A;
  --violet-bg:#EDE8F8; --violet-bd:#D6CCF0; --violet-tx:#5A3FA0;
  --sage-bg:#E2F2EA;   --sage-bd:#BDDECB;   --sage-tx:#2A6E50;
  --sand-bg:#F0EDE6;   --sand-bd:#E0D9CE;   --sand-tx:#7A7060;
  --sky-bg:#E3EEF8;    --sky-bd:#BACED8;    --sky-tx:#2A5880;
  --mint-bg:#E0F4F4;   --mint-bd:#AEDADA;   --mint-tx:#1E6E6E;
  --indigo-bg:#E8E4F8; --indigo-bd:#CAC0EC; --indigo-tx:#3A2EA0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--t1);font-size:13px;line-height:1.7}

/* ── UPLOAD ── */
#uploadPage{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;gap:28px}
.up-title{text-align:center}
.up-title h1{font-size:20px;font-weight:700;letter-spacing:-.3px;color:var(--t1)}
.up-title p{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.85}
.up-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:560px}
.up-card{border:1.5px dashed var(--border);border-radius:10px;padding:28px 18px;
  text-align:center;cursor:pointer;transition:.18s;background:var(--card);position:relative}
.up-card:hover,.up-card.over{border-color:var(--t3);background:var(--bg)}
.up-card.done{border-color:var(--sage-bd);border-style:solid;background:var(--sage-bg)}
.up-card input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.up-name{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:4px}
.up-sub{font-size:11px;color:var(--t4)}
.up-file{font-size:11px;color:var(--sage-tx);font-weight:600;margin-top:10px;word-break:break-all}
.up-file.idle{color:var(--t4);font-weight:400}
.gen-btn{background:var(--t1);color:#fff;border:none;border-radius:8px;
  padding:12px 44px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.2px;transition:.18s}
.gen-btn:disabled{opacity:.28;cursor:not-allowed}
.gen-btn:not(:disabled):hover{opacity:.85}
.up-note{font-size:11px;color:var(--t4)}

/* ── REPORT ── */
#reportPage{display:none;max-width:920px;margin:0 auto;padding:28px 20px 64px}
.ctrl-bar{display:flex;gap:8px;margin-bottom:22px;justify-content:flex-end}
.ctrl-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:7px 14px;font-size:12px;cursor:pointer;color:var(--t3);font-weight:500;transition:.15s}
.ctrl-btn:hover{background:var(--bg)}
.ctrl-btn.primary{background:var(--t1);color:#fff;border-color:var(--t1)}
.ctrl-btn.primary:hover{opacity:.85}

/* report header */
.rpt-header{background:var(--t1);color:#fff;border-radius:10px;
  padding:26px 30px;margin-bottom:22px}
.rpt-sub{font-size:10px;color:#888;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.rpt-header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.rpt-meta{font-size:11px;color:#888;display:flex;gap:20px;flex-wrap:wrap;
  margin-top:14px;padding-top:14px;border-top:1px solid #2E2E2E}

/* section */
.section{background:var(--card);border-radius:10px;padding:22px 24px;
  margin-bottom:14px;border:1px solid var(--border-lt)}
.section-title{font-size:14px;font-weight:700;color:var(--t1);
  padding-bottom:14px;border-bottom:1px solid var(--border-lt);
  margin-bottom:18px;display:flex;align-items:baseline;gap:8px}
.sec-num{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.6px;
  border:1px solid var(--border);border-radius:4px;padding:1px 6px;flex-shrink:0}
.sec-sub{font-size:11px;color:var(--t4);font-weight:400;margin-left:auto}

/* stat cards */
.stat-cards{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.sc{flex:1;min-width:80px;border-radius:8px;padding:12px 14px;
  text-align:center;border:1px solid transparent}
.sc-num{font-size:20px;font-weight:700;line-height:1.2}
.sc-lbl{font-size:10px;margin-top:3px;font-weight:500;letter-spacing:.3px;opacity:.8}
.sc.total{background:var(--t1);color:#fff}
.sc.rose  {background:var(--rose-bg);border-color:var(--rose-bd);color:var(--rose-tx)}
.sc.amber {background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}
.sc.violet{background:var(--violet-bg);border-color:var(--violet-bd);color:var(--violet-tx)}
.sc.sage  {background:var(--sage-bg);border-color:var(--sage-bd);color:var(--sage-tx)}
.sc.sand  {background:var(--sand-bg);border-color:var(--sand-bd);color:var(--sand-tx)}
.sc.sky   {background:var(--sky-bg);border-color:var(--sky-bd);color:var(--sky-tx)}
.sc.indigo{background:var(--indigo-bg);border-color:var(--indigo-bd);color:var(--indigo-tx)}

/* bars */
.bar-section{margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-lbl{font-size:11px;color:var(--t3);width:52px;text-align:right;flex-shrink:0}
.bar-wrap{flex:1;height:10px;background:var(--border-lt);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .4s}
.bar-fill.rose  {background:#E8A4AC}
.bar-fill.amber {background:#E8BB88}
.bar-fill.violet{background:#B4A0D8}
.bar-fill.sage  {background:#88C4A8}
.bar-fill.sand  {background:#C8C0B0}
.bar-cnt{font-size:11px;color:var(--t3);width:34px;flex-shrink:0}
.bar-pct{font-size:10px;color:var(--t4);width:30px;flex-shrink:0}

/* channel grid */
.ch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
.ch-card{border:1px solid var(--border-lt);border-radius:8px;padding:14px;background:var(--bg)}
.ch-name{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.5px;
  text-transform:uppercase;margin-bottom:10px}

/* table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg);color:var(--t3);font-weight:600;padding:8px 10px;
  text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);
  font-size:11px;letter-spacing:.3px}
td{padding:7px 10px;border-bottom:1px solid var(--border-lt);color:var(--t2);white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.rank{color:var(--t4);font-size:11px}
.hosp{color:var(--t1);font-weight:500;max-width:160px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* badges */
.badge{display:inline-block;border-radius:4px;padding:1px 7px;
  font-size:10px;font-weight:600;letter-spacing:.2px;border:1px solid transparent}
.b-rose  {background:var(--rose-bg);border-color:var(--rose-bd);color:var(--rose-tx)}
.b-amber {background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}
.b-violet{background:var(--violet-bg);border-color:var(--violet-bd);color:var(--violet-tx)}
.b-sage  {background:var(--sage-bg);border-color:var(--sage-bd);color:var(--sage-tx)}
.b-sand  {background:var(--sand-bg);border-color:var(--sand-bd);color:var(--sand-tx)}
.b-sky   {background:var(--sky-bg);border-color:var(--sky-bd);color:var(--sky-tx)}
.b-mint  {background:var(--mint-bg);border-color:var(--mint-bd);color:var(--mint-tx)}
.b-indigo{background:var(--indigo-bg);border-color:var(--indigo-bd);color:var(--indigo-tx)}

/* value */
.v-hi{color:var(--rose-tx);font-weight:600}
.v-md{color:var(--amber-tx);font-weight:600}
.v-na{color:var(--t4)}

/* analysis */
.box{background:var(--bg);border-radius:8px;padding:16px;margin-top:14px;border:1px solid var(--border-lt)}
.box-title{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.6px;
  text-transform:uppercase;margin-bottom:12px}
.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.box-item{background:var(--card);border-radius:6px;padding:10px 12px;border:1px solid var(--border-lt)}
.bi-lbl{font-size:10px;color:var(--t4);margin-bottom:3px}
.bi-val{font-size:16px;font-weight:700;color:var(--t1);line-height:1.2}
.bi-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* strategy */
.strat{border-radius:8px;overflow:hidden;margin-top:14px;border:1px solid var(--border-lt)}
.strat-head{padding:11px 16px;font-size:12px;font-weight:700;
  letter-spacing:.2px;background:var(--bg);border-bottom:1px solid var(--border-lt);color:var(--t2)}
.strat-body{padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--card)}
.strat-intro{font-size:12px;color:var(--t3);line-height:1.75;
  padding-bottom:12px;border-bottom:1px solid var(--border-lt)}
.act-row{display:flex;gap:10px;align-items:flex-start}
.pill{flex-shrink:0;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;
  letter-spacing:.3px;margin-top:1px;border:1px solid transparent}
.pill.rose  {background:var(--rose-bg);border-color:var(--rose-bd);color:var(--rose-tx)}
.pill.amber {background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx)}
.pill.violet{background:var(--violet-bg);border-color:var(--violet-bd);color:var(--violet-tx)}
.pill.sage  {background:var(--sage-bg);border-color:var(--sage-bd);color:var(--sage-tx)}
.pill.sky   {background:var(--sky-bg);border-color:var(--sky-bd);color:var(--sky-tx)}
.pill.indigo{background:var(--indigo-bg);border-color:var(--indigo-bd);color:var(--indigo-tx)}
.act-text{font-size:12px;color:var(--t3);line-height:1.7}
.act-text strong{color:var(--t1)}
.strat-note{font-size:11px;color:var(--t4);padding:9px 12px;background:var(--bg);
  border-radius:6px;line-height:1.75}

/* limitation section */
.lim-intro{font-size:12px;color:var(--t3);line-height:1.8;padding:12px 14px;
  background:var(--bg);border-radius:6px;margin-bottom:16px;border:1px solid var(--border-lt)}
.lim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lim-card{border:1px solid var(--border-lt);border-radius:8px;padding:14px 16px;background:var(--card)}
.lim-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lim-name{font-size:12px;font-weight:700;color:var(--t1)}
.lim-row{margin-bottom:8px}
.lim-row:last-child{margin-bottom:0}
.lim-row-lbl{font-size:10px;font-weight:700;color:var(--t4);letter-spacing:.4px;
  text-transform:uppercase;margin-bottom:2px}
.lim-row-txt{font-size:11px;color:var(--t3);line-height:1.65}
.lim-row-txt strong{color:var(--t1)}
.lim-arrow{font-size:11px;color:var(--t4);margin:0 3px}
@media(max-width:600px){.lim-grid{grid-template-columns:1fr}}

/* share modal */
.sh-modal{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;
  display:none;align-items:center;justify-content:center}
.sh-modal.open{display:flex}
.sh-box{background:var(--card);border-radius:12px;padding:26px 28px;width:420px;max-width:92vw}
.sh-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:6px}
.sh-desc{font-size:12px;color:var(--t3);line-height:1.8;margin-bottom:14px}
.sh-inp{width:100%;border:1px solid var(--border);border-radius:6px;padding:9px 12px;
  font-size:12px;font-family:monospace;outline:none;color:var(--t1);margin-bottom:4px}
.sh-inp:focus{border-color:var(--t3)}
.sh-hint{font-size:10px;color:var(--t4);margin-bottom:14px;line-height:1.6}
.sh-hint a{color:var(--t3)}
.sh-result{padding:12px 14px;background:var(--bg);border-radius:8px;
  border:1px solid var(--border-lt);margin-bottom:6px}
.sh-result-lbl{font-size:10px;color:var(--t4);letter-spacing:.3px;margin-bottom:4px}
.sh-result-url{font-size:12px;color:var(--t2);word-break:break-all;line-height:1.6}
.sh-result-url a{color:var(--t1);font-weight:600;text-decoration:none}
.sh-note{font-size:10px;color:var(--t4);text-align:center;line-height:1.7}
.sh-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.sh-btn{border-radius:6px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--t2);transition:.15s}
.sh-btn:hover{background:var(--bg)}
.sh-btn.p{background:var(--t1);color:#fff;border-color:var(--t1)}
.sh-btn.p:hover{opacity:.85}
.sh-btn:disabled{opacity:.35;cursor:not-allowed}
.sh-status{font-size:12px;color:var(--t3);padding:8px 0;text-align:center}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

/* part divider */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0 14px}
.divider h2{font-size:14px;font-weight:700;white-space:nowrap;color:var(--t2)}
.divider hr{flex:1;border:none;border-top:1px solid var(--border-lt)}

/* print */
@page{size:A4;margin:14mm 14mm 16mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff}
  #uploadPage{display:none!important}
  .sh-modal{display:none!important}
  #reportPage{display:block!important;padding:0;max-width:none}
  .ctrl-bar{display:none!important}
  .section{break-inside:avoid;border:1px solid var(--border-lt);margin-bottom:10px;
    box-shadow:none!important}
  .rpt-header{border-radius:6px}
  .divider{break-before:page;margin-top:0}
  .tbl-wrap{overflow:visible}
  table{page-break-inside:auto}
  tr{page-break-inside:avoid}
  .lim-grid{grid-template-columns:1fr 1fr}
  .ch-grid{grid-template-columns:repeat(3,1fr)}
  .bar-fill{print-color-adjust:exact}
}
@media(max-width:600px){
  .up-grid,.ch-grid{grid-template-columns:1fr}
  .stat-cards{gap:6px}
}
</style>
</head>
<body>

<!-- UPLOAD -->
<div id="uploadPage">
  <div class="up-title">
    <h1>정기 KPI 보고서 생성기</h1>
    <p>이탈지표 · 성공지표 엑셀 파일을 업로드하면 보고서가 자동 생성됩니다<br>
    둘 중 하나만 업로드해도 해당 파트 보고서가 생성됩니다</p>
  </div>

  <div class="up-grid">
    <div class="up-card" id="etalCard">
      <input type="file" id="etalInput" accept=".xlsx,.xls">
      <div class="up-name">이탈지표 파일</div>
      <div class="up-sub">[정기 KPI 보고] 이탈지표.xlsx</div>
      <div class="up-file idle" id="etalFile">클릭 또는 드래그하여 업로드</div>
    </div>
    <div class="up-card" id="successCard">
      <input type="file" id="successInput" accept=".xlsx,.xls">
      <div class="up-name">성공지표 파일</div>
      <div class="up-sub">[정기 KPI 보고] 성공지표.xlsx</div>
      <div class="up-file idle" id="successFile">클릭 또는 드래그하여 업로드</div>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" disabled onclick="generateReport()">보고서 생성</button>
  <p class="up-note">파일은 브라우저 내에서만 처리되며 외부로 전송되지 않습니다</p>
</div>

<!-- REPORT -->
<div id="reportPage">
  <div class="ctrl-bar">
    <button class="ctrl-btn" onclick="backToUpload()">← 다시 업로드</button>
    <button class="ctrl-btn" onclick="printPDF()">PDF 다운로드</button>
    <button class="ctrl-btn primary" onclick="openShareModal()">링크 공유</button>
  </div>
  <div id="reportContent"></div>
</div>

<!-- Share Modal -->
<div class="sh-modal" id="shModal" onclick="if(event.target===this)closeShareModal()">
  <div class="sh-box" id="shBox"></div>
</div>

<script>
// ── STATE ──
let etalWB = null, successWB = null;

// ── UPLOAD ──
function setupUpload(inputId, cardId, fileId, type) {
  const inp  = document.getElementById(inputId);
  const card = document.getElementById(cardId);
  const lbl  = document.getElementById(fileId);
  inp.addEventListener('change', e => load(e.target.files[0], type, card, lbl));
  card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('over'); });
  card.addEventListener('dragleave', () => card.classList.remove('over'));
  card.addEventListener('drop', e => { e.preventDefault(); card.classList.remove('over'); load(e.dataTransfer.files[0], type, card, lbl); });
}
function load(file, type, card, lbl) {
  if (!file) return;
  new FileReader().onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    if (type === 'etal') etalWB = wb; else successWB = wb;
    card.classList.add('done');
    lbl.classList.remove('idle');
    lbl.textContent = '업로드 완료  ' + file.name;
    document.getElementById('genBtn').disabled = !etalWB && !successWB;
  };
  const fr = new FileReader();
  fr.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'binary' });
    if (type === 'etal') etalWB = wb; else successWB = wb;
    card.classList.add('done');
    lbl.classList.remove('idle');
    lbl.textContent = '업로드 완료  ' + file.name;
    document.getElementById('genBtn').disabled = !etalWB && !successWB;
  };
  fr.readAsBinaryString(file);
}
setupUpload('etalInput',    'etalCard',    'etalFile',    'etal');
setupUpload('successInput', 'successCard', 'successFile', 'success');
function backToUpload() {
  document.getElementById('reportPage').style.display = 'none';
  document.getElementById('uploadPage').style.display = 'flex';
}

function printPDF() {
  window.print();
}

// ── PARSE ──
function rows(wb, hint) {
  const name = wb.SheetNames.find(n => n.includes(hint)) || wb.SheetNames[1];
  return XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
}
function parseEtal(wb) {
  const all = rows(wb, '이탈'), meta = all[1] || [], out = [];
  for (let i = 6; i < all.length; i++) {
    const r = all[i], name = String(r[1]||'').trim();
    if (!name || name === '병원명') continue;
    out.push({ name, totalRate:r[2], naewonRate:r[3], jnrRate:r[4], kakaoRate:r[5],
      totalDays:r[7], naewonDays:r[9], jnrDays:r[11], kakaoDays:r[13],
      lTotal:String(r[16]||'').trim(), lNaewon:String(r[17]||'').trim(), lJnr:String(r[18]||'').trim(), lKakao:String(r[19]||'').trim() });
  }
  return { period:String(meta[1]||''), updated:String(meta[4]||''), rows:out };
}
function parseSuccess(wb) {
  const all = rows(wb, '성공'), meta = all[2] || [], out = [];
  for (let i = 6; i < all.length; i++) {
    const r = all[i], name = String(r[1]||'').trim();
    if (!name || name === '병원명') continue;
    out.push({ name, crm:parseFloat(r[2])||0, naewon:parseFloat(r[3])||0, features:parseFloat(r[4])||0,
      lActivity:String(r[21]||''), lParticipation:String(r[22]||'') });
  }
  return { period:String(meta[1]||''), updated:String(meta[4]||''), rows:out };
}

// ── MATH ──
const RW = {'고위험':4,'중위험':3,'관찰':2,'정상':1};
const RLBL = ['고위험','중위험','관찰','정상','판정불가'];
function toNum(v) { const n=parseFloat(String(v).replace('%','').replace('+','').trim()); return isNaN(n)?null:n; }
function avg(a) { const v=a.filter(x=>!isNaN(x)); return v.length?v.reduce((a,b)=>a+b,0)/v.length:0; }
function median(a) { const s=[...a].filter(v=>!isNaN(v)&&v>=0).sort((a,b)=>a-b); if(!s.length)return 0; const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }

function etalStats(d) {
  const cnt={}, ch={n:{},j:{},k:{}};
  RLBL.forEach(l=>{cnt[l]=0;ch.n[l]=0;ch.j[l]=0;ch.k[l]=0;});
  d.rows.forEach(r=>{
    const tl=RLBL.includes(r.lTotal)?r.lTotal:'판정불가';
    const nl=RLBL.includes(r.lNaewon)?r.lNaewon:'판정불가';
    const jl=RLBL.includes(r.lJnr)?r.lJnr:'판정불가';
    const kl=RLBL.includes(r.lKakao)?r.lKakao:'판정불가';
    cnt[tl]++;ch.n[nl]++;ch.j[jl]++;ch.k[kl]++;
  });
  return {total:d.rows.length,cnt,ch};
}
function successStats(d) {
  const act={상위:0,중위:0,하위:0}, part={최상위:0,상위:0,하위:0};
  d.rows.forEach(r=>{if(act[r.lActivity]!==undefined)act[r.lActivity]++;if(part[r.lParticipation]!==undefined)part[r.lParticipation]++;});
  return {total:d.rows.length,act,part,medCRM:median(d.rows.map(r=>r.crm)),medNaewon:median(d.rows.map(r=>r.naewon))};
}
function topRisk(d) {
  const list=d.rows.filter(r=>r.lTotal==='고위험'||r.lTotal==='중위험');
  list.sort((a,b)=>{const rw={'고위험':2,'중위험':1};const rd=(rw[b.lTotal]||0)-(rw[a.lTotal]||0);if(rd)return rd;const dd=(parseFloat(b.totalDays)||0)-(parseFloat(a.totalDays)||0);if(dd)return dd;return(toNum(a.totalRate)??0)-(toNum(b.totalRate)??0);});
  return {list,n:list.length,nHigh:d.rows.filter(r=>r.lTotal==='고위험').length,nMid:d.rows.filter(r=>r.lTotal==='중위험').length,total:d.rows.length};
}
function topSuccess(d,st) {
  const list=d.rows.filter(r=>r.lActivity==='상위'&&(r.lParticipation==='상위'||r.lParticipation==='최상위'));
  const wt=st.medCRM/Math.max(st.medNaewon,1);
  list.sort((a,b)=>(b.crm+b.naewon*wt)-(a.crm+a.naewon*wt));
  return {list,n:list.length,total:d.rows.length};
}

// ── HTML HELPERS ──
function rateHtml(v) {
  const n=toNum(v);
  if(n===null)return`<span class="v-na">${v||'-'}</span>`;
  const s=n.toFixed(1)+'%';
  if(n<=-50)return`<span class="v-hi">${s}</span>`;
  if(n<0)return`<span class="v-md">${s}</span>`;
  return`<span>${n>0?'+':''}${s}</span>`;
}
function daysHtml(v) {
  const n=parseFloat(v);
  if(isNaN(n))return`<span class="v-na">${v||'-'}</span>`;
  const d=Math.round(n)+'일';
  if(n>=14)return`<span class="v-hi">${d}</span>`;
  if(n>=4)return`<span class="v-md">${d}</span>`;
  return`<span>${d}</span>`;
}
function lbdg(l) {
  const m={'고위험':'b-rose','중위험':'b-amber','관찰':'b-violet','정상':'b-sage','판정불가':'b-sand',
    '상위':'b-sage','중위':'b-sky','하위':'b-sand','최상위':'b-indigo'};
  return`<span class="badge ${m[l]||'b-sand'}">${l||'-'}</span>`;
}
function scards(pairs){ return'<div class="stat-cards">'+pairs.map(([c,n,l])=>`<div class="sc ${c}"><div class="sc-num">${n}</div><div class="sc-lbl">${l}</div></div>`).join('')+'</div>'; }
function barRows(pairs,total){ return pairs.map(([c,l,cnt])=>{const w=Math.round(cnt/Math.max(total,1)*100);return`<div class="bar-row"><span class="bar-lbl">${l}</span><div class="bar-wrap"><div class="bar-fill ${c}" style="width:${w}%"></div></div><span class="bar-cnt">${cnt.toLocaleString()}</span><span class="bar-pct">${w}%</span></div>`;}).join(''); }
function chBars(counts,total){ return['고위험','중위험','관찰','정상'].map(l=>{const c={고위험:'rose',중위험:'amber',관찰:'violet',정상:'sage'}[l];const cnt=counts[l]||0;const w=Math.round(cnt/Math.max(total,1)*100);return`<div class="bar-row"><span class="bar-lbl">${l}</span><div class="bar-wrap"><div class="bar-fill ${c}" style="width:${w}%"></div></div><span class="bar-cnt">${cnt}</span></div>`;}).join(''); }

function secSuccessTop(d) {
  const st=successStats(d);
  const {list,n,total}=topSuccess(d,st);
  if(!list.length)return'';
  const trs=list.map((h,i)=>`<tr><td class="rank">${i+1}</td><td class="hosp" title="${h.name}">${h.name}</td><td>${h.crm.toLocaleString()}</td><td>${h.naewon.toLocaleString()}</td><td>${h.features} / 5</td><td>${lbdg(h.lActivity)}</td><td>${lbdg(h.lParticipation)}</td></tr>`).join('');
  const avgCRM=Math.round(avg(list.map(h=>h.crm)));
  const avgNaewon=Math.round(avg(list.map(h=>h.naewon)));
  const avgFeat=avg(list.map(h=>h.features)).toFixed(1);
  const full5=list.filter(h=>h.features>=5).length;
  const {medCRM,medNaewon}=st;
  const midBorder=d.rows.filter(r=>r.lActivity==='중위'&&(r.crm>medCRM*.7||r.naewon>medNaewon*.7)).length;
  return`<div class="section">
    <div class="section-title"><span class="sec-num">05</span>활동·참여 성과 동시 상위 병원 리스트<span class="sec-sub">전체 ${total}개 중 ${n}개 · CRM 발송량 순</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>병원명</th><th>CRM 발송량</th><th>내원관리 등록</th><th>활용 기능</th><th>활동 성과</th><th>참여 성과</th></tr></thead>
      <tbody>${trs}</tbody>
    </table></div>
    <div class="box">
      <div class="box-title">특징 분석</div>
      <div class="box-grid">
        <div class="box-item"><div class="bi-lbl">동시 상위 달성 병원</div><div class="bi-val">${n}개 병원</div><div class="bi-sub">활동·참여 성과 모두 상위</div></div>
        <div class="box-item"><div class="bi-lbl">평균 CRM 발송량</div><div class="bi-val">${avgCRM.toLocaleString()}건</div><div class="bi-sub">중위값 대비 ${(avgCRM/Math.max(medCRM,1)).toFixed(1)}배</div></div>
        <div class="box-item"><div class="bi-lbl">평균 내원관리 등록</div><div class="bi-val">${avgNaewon.toLocaleString()}건</div><div class="bi-sub">중위값 대비 ${(avgNaewon/Math.max(medNaewon,1)).toFixed(1)}배</div></div>
        <div class="box-item"><div class="bi-lbl">평균 활용 기능 수</div><div class="bi-val">${avgFeat} / 5</div><div class="bi-sub">5개 완전 활용 ${full5}개 병원</div></div>
      </div>
    </div>
    <div class="strat">
      <div class="strat-head">성공 사례 확산 전략</div>
      <div class="strat-body">
        <p class="strat-intro">활동·참여 성과를 동시에 상위 달성한 <strong>${n}개 병원</strong>의 평균 CRM 발송량 <strong>${avgCRM.toLocaleString()}건</strong>, 내원관리 등록 <strong>${avgNaewon.toLocaleString()}건</strong> — 전체 중위값 대비 각각 <strong>${(avgCRM/Math.max(medCRM,1)).toFixed(1)}배 · ${(avgNaewon/Math.max(medNaewon,1)).toFixed(1)}배</strong> 수준입니다.</p>
        <div class="act-row"><span class="pill sage">사례 발굴</span><div class="act-text">활용 기능 5개 완전 활용 <strong>${full5}개 병원</strong> 중 인터뷰 대상 선정<br>성공 요인 · 도입 계기 · 체감 효과를 구체적 수치로 정리 → 내부 사례집 제작</div></div>
        <div class="act-row"><span class="pill sky">확산 대상</span><div class="act-text">활동 성과 <strong>중위</strong> 병원 중 상위 경계선 근처 <strong>~${midBorder}개 병원</strong> 집중 지원<br>동시 상위 병원의 발송량 · 등록건수 벤치마크 데이터를 비교 자료로 직접 제시</div></div>
        <div class="act-row"><span class="pill indigo">벤치마크</span><div class="act-text">이 <strong>${n}개 병원</strong>을 진료과 · 규모별 롤모델로 분류<br>유사 병원에 맞춤 비교 자료 제공 → 활용 기능 확대 유도</div></div>
        <div class="strat-note">평균 활용 기능 ${avgFeat}개 / 5개 — 기능 미활용 병원에 맞춤 온보딩 제안이 효과적</div>
      </div>
    </div>
  </div>`;
}

// ── SHARE / PUBLISH ──
const GH_REPO = 'HWANGSOMYEONG/kpi-report-generator';
const GH_PAGES = 'https://hwangsomyeong.github.io/kpi-report-generator';

function openShareModal() {
  const token = localStorage.getItem('gh_pat') || '';
  renderModal(token ? 'confirm' : 'token');
  document.getElementById('shModal').classList.add('open');
}
function closeShareModal() {
  document.getElementById('shModal').classList.remove('open');
}

function renderModal(stage, data) {
  const box = document.getElementById('shBox');
  if (stage === 'token') {
    box.innerHTML = `
      <div class="sh-title">GitHub 토큰 설정</div>
      <div class="sh-desc">보고서를 링크로 공유하려면 GitHub Personal Access Token이 필요합니다. 한 번만 입력하면 이후 자동으로 사용됩니다.</div>
      <input class="sh-inp" id="shTokInp" type="password" placeholder="ghp_xxxxxxxxxxxxxxxx">
      <div class="sh-hint">
        <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=KPI+보고서+생성기" target="_blank">토큰 발급 바로가기</a> →
        Expiration 설정 후 <strong>public_repo</strong> 스코프 체크 → Generate
      </div>
      <div class="sh-btns">
        <button class="sh-btn" onclick="closeShareModal()">취소</button>
        <button class="sh-btn p" onclick="saveToken()">저장 후 공유</button>
      </div>`;
  } else if (stage === 'confirm') {
    box.innerHTML = `
      <div class="sh-title">보고서 링크 생성</div>
      <div class="sh-desc">보고서를 GitHub에 저장하고 고정 링크를 생성합니다.</div>
      <div class="sh-btns">
        <button class="sh-btn" onclick="closeShareModal()">취소</button>
        <button class="sh-btn" style="font-size:11px;color:var(--t4)" onclick="localStorage.removeItem('gh_pat');renderModal('token')">토큰 재설정</button>
        <button class="sh-btn p" onclick="publishReport()">링크 생성</button>
      </div>`;
  } else if (stage === 'loading') {
    box.innerHTML = `
      <div class="sh-title">보고서 저장 중</div>
      <div class="sh-status"><span class="spin">↻</span>  GitHub에 업로드하는 중입니다...</div>`;
  } else if (stage === 'done') {
    box.innerHTML = `
      <div class="sh-title">링크 생성 완료</div>
      <div class="sh-result">
        <div class="sh-result-lbl">보고서 URL</div>
        <div class="sh-result-url"><a href="${data.url}" target="_blank">${data.url}</a></div>
      </div>
      <div class="sh-note">GitHub Pages 배포에 1~2분 소요됩니다.<br>그 전에 열면 404가 뜰 수 있어요.</div>
      <div class="sh-btns">
        <button class="sh-btn" onclick="closeShareModal()">닫기</button>
        <button class="sh-btn p" onclick="navigator.clipboard.writeText('${data.url}').then(()=>this.textContent='복사됨!')">URL 복사</button>
      </div>`;
  } else if (stage === 'error') {
    box.innerHTML = `
      <div class="sh-title">오류 발생</div>
      <div class="sh-desc" style="color:var(--rose-tx)">${data.msg}</div>
      <div class="sh-btns">
        <button class="sh-btn" onclick="closeShareModal()">닫기</button>
        <button class="sh-btn p" onclick="publishReport()">다시 시도</button>
      </div>`;
  }
}

function saveToken() {
  const tok = document.getElementById('shTokInp').value.trim();
  if (!tok) return;
  localStorage.setItem('gh_pat', tok);
  publishReport();
}

async function publishReport() {
  const token = localStorage.getItem('gh_pat');
  if (!token) { renderModal('token'); return; }

  renderModal('loading');

  try {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const fname = `reports/${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.html`;
    const html  = makeStandaloneHtml();
    const b64   = toB64(html);

    const res = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${fname}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: `보고서 추가: ${fname}`, content: b64 }),
    });

    if (res.status === 401) {
      localStorage.removeItem('gh_pat');
      renderModal('error', { msg: '토큰이 유효하지 않습니다. 토큰을 다시 입력해주세요.' });
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const url = `${GH_PAGES}/${fname}`;
    renderModal('done', { url });
  } catch (e) {
    renderModal('error', { msg: `업로드 실패: ${e.message}` });
  }
}

function toB64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}

function makeStandaloneHtml() {
  const css     = document.querySelector('style').textContent;
  const content = document.getElementById('reportContent').innerHTML;
  return `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KPI 보고서</title>
<style>${css}</style>
</head>
<body>
<div style="max-width:920px;margin:0 auto;padding:28px 20px 64px">
  <div style="display:flex;justify-content:flex-end;margin-bottom:18px">
    <a href="${GH_PAGES}/" style="font-size:12px;color:var(--t4);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:6px 12px">새 보고서 생성</a>
  </div>
  ${content}
</div>
</body>
</html>`;
}

// ── GENERATE ──
function generateReport() {
  const ed = etalWB    ? parseEtal(etalWB)       : null;
  const sd = successWB ? parseSuccess(successWB) : null;
  if (!ed && !sd) return;
  const period  = (ed||sd).period;
  const updated = (ed||sd).updated;
  const today   = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
  let html = `<div class="rpt-header">
    <div class="rpt-sub">Revisit  ·  고객 관리지표 대시보드</div>
    <h1>정기 KPI 보고서</h1>
    <div class="rpt-meta">
      <span>보고 기간  ${period}</span>
      <span>마지막 갱신  ${updated}</span>
      <span>보고서 생성  ${today}</span>
    </div>
  </div>`;
  if (ed) { html += `<div class="divider"><hr><h2>이탈지표</h2><hr></div>${secEtalStats(ed)}${secEtalTop(ed)}${secEtalLimitations()}`; }
  if (sd) { html += `<div class="divider"><hr><h2>성공지표</h2><hr></div>${secSuccessStats(sd)}${secSuccessTop(sd)}${secSuccessLimitations()}`; }
  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('uploadPage').style.display = 'none';
  document.getElementById('reportPage').style.display = 'block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
